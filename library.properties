sentence=Use your iPhone as a wireless display for ESP32 projects.
paragraph=Drop-in replacement for Adafruit_GFX that renders over BLE or WiFi to the ESP32PhoneDisplay iPhone app. Efficient binary protocol sends single commands for text, circles, and all shapes. Supports custom transports (LoRa, serial, etc.) via GraphicsTransport interface. BLE and WiFi transports included.
